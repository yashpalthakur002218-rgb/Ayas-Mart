<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Ayas Mart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow p-4 border-0 rounded-4 bg-white">
                    <h3 class="fw-bold text-center mb-4">📝 Create Account</h3>
                    <hr>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">यूजरनेम (Username)</label>
                            <input type="text" name="username" class="form-control" placeholder="एक यूनिक नाम चुनें" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">ईमेल (Email)</label>
                            <input type="email" name="email" class="form-control" placeholder="अपनी ईमेल आईडी डालें" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">पासवर्ड (Password)</label>
                            <input type="password" name="password" class="form-control" placeholder="एक मजबूत पासवर्ड बनाएं" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 py-2 fw-bold rounded-3">अकाउंट बनाएं (Register)</button>
                    </form>
                    <p class="text-center mt-3 text-muted">पहले से अकाउंट है? <a href="{% url 'login' %}" class="fw-bold text-primary">लॉगिन करें</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
